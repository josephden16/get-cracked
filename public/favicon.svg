<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <mask id="bolt" maskUnits="userSpaceOnUse">
      <path fill="#fff"
        d="M26.946 45.938c-.664.845-2.021.375-2.021-.698V34.937a2.26 2.26 0 0 0-2.262-2.262H11.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H2.237c-.92 0-1.456-1.04-.92-1.788L11.013 1.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L26.947 45.94z" />
    </mask>
    <filter id="glow-edge" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse" x="-10"
      y="-10" width="68" height="68">
      <feGaussianBlur stdDeviation="7" />
    </filter>
    <filter id="glow-mid" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse" x="-10"
      y="-10" width="68" height="68">
      <feGaussianBlur stdDeviation="4.5" />
    </filter>
    <filter id="glow-hi" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse" x="-10"
      y="-10" width="68" height="68">
      <feGaussianBlur stdDeviation="4.5" />
    </filter>
  </defs>

  <!-- base bolt fill -->
  <path fill="#30d158"
    d="M26.946 45.938c-.664.845-2.021.375-2.021-.698V34.937a2.26 2.26 0 0 0-2.262-2.262H11.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H2.237c-.92 0-1.456-1.04-.92-1.788L11.013 1.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L26.947 45.94z" />

  <!-- gradient glow layers, clipped to bolt shape -->
  <g mask="url(#bolt)">
    <!-- left-edge dark-green depth -->
    <g filter="url(#glow-edge)">
      <ellipse cx="5" cy="24" rx="6" ry="30" fill="#1a7a38" transform="rotate(90 5 24)" />
    </g>
    <!-- bottom sweep -->
    <g filter="url(#glow-mid)">
      <ellipse cx="24" cy="52" rx="10" ry="30" fill="#0d5c2b" transform="rotate(38 24 52)" />
    </g>
    <!-- top-right bright highlight -->
    <g filter="url(#glow-hi)">
      <ellipse cx="42" cy="6" rx="6" ry="10" fill="#a8f5c0" transform="rotate(38 42 6)" />
    </g>
    <!-- secondary highlight shimmer -->
    <g filter="url(#glow-mid)">
      <ellipse cx="38" cy="32" rx="6" ry="15" fill="#6ee89a" transform="rotate(38 38 32)" />
    </g>
  </g>
</svg>